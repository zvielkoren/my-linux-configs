name: 🚀 Deploy Installer to Pages

on:
  push:
    paths:
      - 'install.sh'
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
      
      - name: 🛠️ Setup Pages
        uses: actions/configure-pages@v5
        
      - name: 🏗️ Build Installer Site
        run: |
          mkdir -p public
          cp install.sh public/index.sh
          echo "get.zviel.com" > public/CNAME
          touch public/.nojekyll
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Zviel's Installer</title>
              <style>
                  body { font-family: 'JetBrains Mono', monospace; text-align: center; padding: 50px; background: #0d0f14; color: #dcdcdc; }
                  h1 { color: #ffffff; }
                  .cmd { background-color: #1e1e2e; padding: 15px; border-radius: 10px; display: inline-block; border: 1px solid #444; }
                  code { color: #a6e3a1; }
              </style>
          </head>
          <body>
              <h1>🚀 Zviel's Quick Installer</h1>
              <p>Run this command in your terminal:</p>
              <div class="cmd">
                <code>curl -sL get.zviel.com/index.sh | bash</code>
              </div>
          </body>
          </html>
          EOF
      
      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
