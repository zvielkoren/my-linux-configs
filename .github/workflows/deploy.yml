name: 🚀 Deploy Installer to Pages

on:
  push:
    paths:
      - 'install.sh'
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Private Repo
        uses: actions/checkout@v4

      - name: 📂 Prepare Public Folder
        run: |
          mkdir -p public
          cp install.sh public/index.sh
          # Create a dummy index.html so Pages is happy
          echo "Redirecting to installer..." > public/index.html

      - name: 🛠️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
