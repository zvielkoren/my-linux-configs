name: 🚀 Deploy Installer to Pages

on:
  push:
    paths:
      - 'install.sh'
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Private Repo
        uses: actions/checkout@v4

      - name: 📂 Prepare Public Folder
        run: |
          mkdir -p public
          cp install.sh public/index.sh
          echo "get.zviel.com" > public/CNAME
          touch public/.nojekyll
          # Create index.html that links to the script
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Zviel's Installer</title>
              <style>
                  body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
                  h1 { color: #333; }
                  .container { max-width: 600px; margin: 0 auto; }
                  .button { 
                      display: inline-block; 
                      padding: 12px 30px; 
                      background-color: #0366d6; 
                      color: white; 
                      text-decoration: none; 
                      border-radius: 6px;
                      margin: 10px;
                  }
                  .button:hover { background-color: #0256c7; }
                  code { background-color: #f6f8fa; padding: 2px 6px; border-radius: 3px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 Zviel's Quick Installer</h1>
                  <p>Install your Linux configurations in one command:</p>
                  <code>curl -sL get.zviel.com/index.sh | bash</code>
                  <p style="margin-top: 30px;">
                      <a href="/index.sh" class="button">📥 Download Script</a>
                  </p>
              </div>
          </body>
          </html>
          EOF

      - name: 🛠️ Setup Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
