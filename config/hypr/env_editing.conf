# 🎬 EDITING ENVIRONMENT
# Color Accuracy & Focus

decoration {
    blur {
        enabled = false
    }
    active_opacity = 1.0
    inactive_opacity = 1.0
}

general {
    gaps_in = 2
    gaps_out = 5
}

# Essential Apps (On Everything)
exec = pgrep -x discord || discord
exec = pgrep -x spotify || spotify

# Auto-launch Editing tools
exec = pgrep -x davinci || /opt/resolve/bin/resolve
