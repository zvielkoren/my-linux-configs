# 🎨 CUSTOM ENVIRONMENT
# Personalized for your workflow

decoration {
    blur {
        enabled = true
        size = 10
        passes = 4
    }
    active_opacity = 0.95
    inactive_opacity = 0.75
}

general {
    gaps_in = 8
    gaps_out = 15
    border_size = 3
    col.active_border = rgba(ff00ffee) rgba(00ffffff) 45deg # Pink/Cyan gradient
}

# Auto-launch your custom UI
exec = pkill quickshell; quickshell
