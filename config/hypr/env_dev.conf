# 🛠️ DEVELOPING ENVIRONMENT
# Aesthetics over raw FPS

decoration {
    blur {
        enabled = true
        size = 6
        passes = 3
    }
    active_opacity = 0.90
    inactive_opacity = 0.80
}

general {
    gaps_in = 5
    gaps_out = 10
    allow_tearing = false
}

# Essential Apps (On Everything)
exec = pgrep -x discord || discord
exec = pgrep -x spotify || spotify

# Auto-launch Dev tools
exec = pgrep -x antigravity || antigravity
exec = pgrep -x idea || idea
exec = pgrep -x kitty || kitty
