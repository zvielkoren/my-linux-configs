# -----------------------------------------------------
# 🌈 ULTIMATE CRAZY GLASS RICE - HYPRLAND (NEON Edition)
# -----------------------------------------------------

# ENVIRONMENT
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# AUTOSTART
exec-once = pkill swaybg; swaybg -i /home/zviel/.config/hypr/wallpapers/bg.jpg -m fill
exec-once = quickshell
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# INPUT
input {
    kb_layout = us,il
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0.15
    accel_profile = flat
    touchpad {
        natural_scroll = true
    }
}

# GENERAL
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(00FF99ee) rgba(00AAFFee) rgba(FF00FFee) 45deg
    col.inactive_border = rgba(1a1a1aaa)
    layout = dwindle
    allow_tearing = false
}

# DECORATION
decoration {
    rounding = 8
    active_opacity = 0.95
    inactive_opacity = 0.85
    
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = true
    }
}

# ANIMATIONS
animations {
    enabled = yes
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = windows, 1, 3, overshot, slide
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 5, default
    animation = borderangle, 1, 30, default, loop
    animation = fade, 1, 5, default
    animation = workspaces, 1, 3, overshot, slidevert
}

# LAYOUTS
dwindle {
    pseudotile = yes
    preserve_split = yes
    force_split = 2
}

# MISC
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# WINDOW RULES
windowrule {
    name = docs-float
    match:initial_class = ^(docs_popup)$
    float = on
    center = on
    pin = on
    size = 1000 800
}

windowrule {
    name = opacity-kitty
    match:class = ^(kitty)$
    opacity = 0.85
}

windowrule {
    name = float-pavu
    match:initial_class = ^(pavucontrol)$
    float = on
}

# LAYER RULES
layerrule {
    name = blur-rofi
    match:namespace = ^(rofi)$
    blur = on
}

layerrule {
    name = blur-dunst
    match:namespace = ^(dunst)$
    blur = on
}

# WORKSPACE RULES
windowrule {
    name = ws1
    match:initial_class = ^(firefox)$
    workspace = 1
}
windowrule {
    name = ws2
    match:initial_class = ^(antigravity)$
    workspace = 2
}
windowrule {
    name = ws2
    match:initial_class = ^(jetbrains-idea)$
    workspace = 2
}
windowrule {
    name = ws3
    match:initial_class = ^(kitty)$
    workspace = 3
}
windowrule {
    name = ws4
    match:initial_class = ^(discord)$
    workspace = 4
}
windowrule {
    name = ws5
    match:initial_class = ^(Spotify)$
    workspace = 5
}
windowrule {
    name = ws6
    match:initial_class = ^(steam)$
    workspace = 6
}
windowrule {
    name = ws7
    match:initial_class = ^(com.obsproject.Studio)$
    workspace = 7
}
windowrule {
    name = ws8
    match:initial_class = ^(resolve)$
    workspace = 8
}
windowrule {
    name = ws9
    match:initial_class = ^(thunar)$
    workspace = 9
}

# KEYBINDINGS
$mainMod = SUPER
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, PERIOD, exec, wofi-emoji
bind = $mainMod, T, exec, firefox
bind = $mainMod, D, exec, /home/zviel/.config/hypr/scripts/docs_hover.sh

# DYNAMIC ENVIRONMENTS
source = ~/.config/hypr/current_env.conf
bind = $mainMod ALT, D, exec, ~/.config/hypr/scripts/switch_env.sh dev
bind = $mainMod ALT, G, exec, ~/.config/hypr/scripts/switch_env.sh gaming
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/switch_env.sh editing
bind = $mainMod ALT, C, exec, ~/.config/hypr/scripts/switch_env.sh custom
bind = $mainMod ALT, H, exec, ~/.config/hypr/scripts/switch_env.sh cyber

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Workspace Switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness and Audio
binde=, XF86MonBrightnessUp, exec, brightnessctl set +5%
binde=, XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Media Control
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous
bindl=, XF86AudioStop, exec, playerctl stop
