# 🎮 GAMING & STREAMING ENVIRONMENT
# Performance Mode - Minimal Latency

decoration {
    blur {
        enabled = false
    }
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = false
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    allow_tearing = true
}

# Essential Apps (On Everything)
exec = pgrep -x discord || discord
exec = pgrep -x spotify || spotify

# Auto-launch Gaming/Streaming tools
exec = pgrep -x steam || steam -silent
exec = pgrep -x obs || obs
