# 🌈 HYPRLOCK - WHITE ANIMATED GRAY BLUR THEME
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading = false
}

background {
    monitor =
    path = /home/zviel/.config/hypr/wallpapers/bg.jpg
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 120
    halign = center
    valign = center
}

# USER AVATAR (main.png)
image {
    monitor =
    path = /home/zviel/.config/sddm-theme/assets/avatar.jpg
    size = 180
    border_size = 4
    border_color = rgba(255, 255, 255, 0.4)
    position = 0, -50
    halign = center
    valign = center
}

# USERNAME
label {
    monitor =
    text = Hello, Zviel
    color = rgba(255, 255, 255, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -180
    halign = center
    valign = center
}

# INPUT FIELD (Pill Style)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.4)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff66">Password...</span>
    hide_input = false
    rounding = 30
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -260
    halign = center
    valign = center
}
