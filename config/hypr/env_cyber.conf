# 💀 HACKER / CYBER ENVIRONMENT
# Maximum Spiciness Engaged

decoration {
    rounding = 2
    active_opacity = 0.85
    inactive_opacity = 0.60
    
    blur {
        enabled = true
        size = 12
        passes = 4
        new_optimizations = true
        xray = true
        noise = 0.05
    }
    
    shadow {
        enabled = true
        range = 30
        render_power = 4
        color = rgba(00FF9966)
    }
}

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(00FF99ee) rgba(005522ee) 45deg
    col.inactive_border = rgba(002211aa)
}

# Hacking Tools & Aesthetics
windowrule {
    name = net-overseer
    match:initial_title = ^(NET_OVERSEER)$
    float = on
    size = 1000 700
    center = on
}

windowrule {
    name = matrix-dump
    match:initial_title = ^(MATRIX_DUMP)$
    float = on
    size = 1200 800
    center = on
}

exec = pkill quickshell; quickshell
exec = kitty --title "NET_OVERSEER" btop
exec = kitty --title "MATRIX_DUMP" bash -c "cmatrix -u 2"
