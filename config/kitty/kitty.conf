# ❄️ CLEAN DARK OFF-WHITE KITTY CONFIG

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.0
window_padding_width 10

# Dark glow transparency
background_opacity 0.85
background #0d0f14
foreground #dcdcdc

# Selection colors
selection_background #313244
selection_foreground #dcdcdc

# Cursor
cursor #dcdcdc
cursor_shape beam
cursor_beam_thickness 1.5

# Tabs
tab_bar_style powerline
active_tab_foreground   #0d0f14
active_tab_background   #dcdcdc
inactive_tab_foreground #dcdcdc
inactive_tab_background #0d0f14

# Color Palette (Clean & Muted)
color0 #1e1e2e
color1 #f38ba8
color2 #a6e3a1
color3 #7f849c   # Changed from yellow to a muted slate gray
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de

color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #a6adc8  # Changed from bright yellow to soft gray-white
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Disable confirm on close for smoother workflow
confirm_os_window_close 0
